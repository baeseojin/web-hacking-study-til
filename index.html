<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seojin's Infra Security TIL</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 1rem;
      text-align: center;
    }

    header h1 { margin: 0; color: var(--accent); }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* 📅 월별 네비게이션 스타일 */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3열 구성 */
      gap: 15px;
      margin-bottom: 3rem;
    }

    @media (max-width: 600px) {
      .month-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .month-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .month-card:hover {
      border-color: var(--accent);
      background-color: rgba(88, 166, 255, 0.05);
      transform: translateY(-3px);
    }

    .month-card .number {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
    }

    .month-card .label {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* 섹션 제목 */
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }

    /* 깃허브 잔디 섹션 */
    .github-section {
      margin-bottom: 3rem;
      padding: 1.5rem;
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .github-section img { width: 100%; height: auto; }

  </style>
</head>
<body>

  <header>
    <h1>🛡️ Infra Security TIL</h1>
    <p>배서진의 인프라/보안 학습 아카이브</p>
  </header>

  <main>
    <section class="github-section">
      <div class="section-title">Contribution</div>
      <img src="https://ghchart.rshah.org/58a6ff/baeseojin" alt="GitHub Chart">
    </section>

    <div class="section-title">Monthly Logs</div>
    <section class="month-grid">
      <a href="Jan/january.html" class="month-card">
        <span class="number">01</span>
        <span class="label">January</span>
      </a>
      <a href="february.html" class="month-card">
        <span class="number">02</span>
        <span class="label">February</span>
      </a>
      <a href="march.html" class="month-card">
        <span class="number">03</span>
        <span class="label">March</span>
      </a>
      <a href="april.html" class="month-card">
        <span class="number">04</span>
        <span class="label">April</span>
      </a>
      <a href="may.html" class="month-card">
        <span class="number">05</span>
        <span class="label">May</span>
      </a>
      <a href="june.html" class="month-card">
        <span class="number">06</span>
        <span class="label">June</span>
      </a>
    </section>

    <div class="section-title">Recent Updates</div>
    <div style="opacity: 0.6; padding: 20px; text-align: center; border: 1px dashed var(--border); border-radius: 8px;">
      월별 카드를 클릭하여 세부 기록을 확인하세요.
    </div>
  </main>

</body>
</html>
